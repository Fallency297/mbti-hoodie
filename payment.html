<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Select Your Type | Identity Quadrant</title>
    <style>
        /* ตกแต่งเพิ่มเติมจาก style.css เดิม */
        .shirt-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .shirt-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .shirt-card:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .shirt-card.selected {
            background: #fff;
            color: #000;
            border-color: #fff;
        }
        .shirt-img-placeholder {
            width: 100%;
            height: 120px;
            background: #444;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #ccc;
        }
        .payment-footer {
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <nav class="nav-bar">
            <div class="brand">IDENTITY QUADRANT.</div>
            <div class="nav-links">
                <a href="preorder.html">ย้อนกลับ</a>
            </div>
        </nav>

        <div class="content-area">
            <div class="order-box">
                <h1 id="quadrantTitle">Your Quadrant</h1>
                <p>เลือกลายเสื้อ MBTI ที่คุณต้องการ</p>

                <div class="shirt-grid" id="shirtOptions">
                    </div>

                <div class="payment-footer">
                    <p>สรุปการสั่งซื้อ: <span id="summaryText">โปรดเลือกแบบเสื้อ</span></p>
                    <button class="btn-reserve" id="payBtn" disabled onclick="confirmPayment()">ไปที่หน้าชำระเงิน</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ข้อมูล MBTI ตาม Quadrant
        const mbtiData = {
            'Rationalists': ['ENTP', 'ENTJ', 'INTJ', 'INTP'],
            'Idealists': ['ENFJ', 'ENFP', 'INFJ', 'INFP'],
            'Sentinels': ['ESTJ', 'ESFJ', 'ISTJ', 'ISFJ'],
            'Explorers': ['ESTP', 'ESFP', 'ISTP', 'ISFP']
        };
<div class="shirt-img-placeholder" style="background: none; height: auto;">
    <img src="hoodie_intj.png" alt="${type} Hoodie" style="width: 100%; border-radius: 10px; display: block;">
</div>
        // 1. รับค่า Quadrant จาก URL
        const params = new URLSearchParams(window.location.search);
        const quadrant = params.get('quadrant');
        const shirtOptionsContainer = document.getElementById('shirtOptions');
        const quadrantTitle = document.getElementById('quadrantTitle');

        if (quadrant && mbtiData[quadrant]) {
            quadrantTitle.innerText = quadrant;
            
            // 2. สร้างปุ่มเลือกเสื้อตามกลุ่ม
            mbtiData[quadrant].forEach(type => {
                const card = document.createElement('div');
                card.className = 'shirt-card';
                card.innerHTML = `
                    <div class="shirt-img-placeholder">ใส่รูปเสื้อ ${type} ที่นี่</div>
                    <strong>${type}</strong>
                `;
                
                card.onclick = function() {
                    // ลบ class selected จากอันอื่น
                    document.querySelectorAll('.shirt-card').forEach(c => c.classList.remove('selected'));
                    // เพิ่ม class selected ให้อันที่กด
                    card.classList.add('selected');
                    // เปิดใช้งานปุ่มจ่ายเงิน
                    const payBtn = document.getElementById('payBtn');
                    payBtn.disabled = false;
                    document.getElementById('summaryText').innerText = "เสื้อลาย " + type + " (" + quadrant + ")";
                };
                
                shirtOptionsContainer.appendChild(card);
            });
        } else {
            quadrantTitle.innerText = "Error";
            shirtOptionsContainer.innerHTML = "<p>ไม่พบข้อมูลกลุ่ม โปรดย้อนกลับไปเลือกใหม่</p>";
        }

        function confirmPayment() {
            const selectedType = document.querySelector('.shirt-card.selected strong').innerText;
            alert('คุณกำลังจะสั่งซื้อลาย: ' + selectedType + '\nระบบกำลังพาท่านไปสู่หน้าชำระเงิน...');
            // ตรงนี้สามารถเชื่อมต่อไปยังหน้า PromptPay หรือหน้าฟอร์มกรอกที่อยู่ได้
        }
    </script>
</body>
</html>
