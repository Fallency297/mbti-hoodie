<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Select Your Type | Identity Quadrant</title>
    <style>
        .shirt-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        .shirt-card { 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 15px; 
            padding: 20px; 
            text-align: center; 
            color: white;
        }
        .shirt-img { max-width: 150px; height: auto; display: block; margin: 0 auto 15px auto; }
        .desc-text { font-size: 0.9rem; margin: 10px 0; opacity: 0.8; }
        .order-btn { 
            display: inline-block; padding: 12px 30px; margin-top: 10px;
            background-color: white; color: #1e3a8a; text-decoration: none;
            font-weight: bold; border-radius: 25px; transition: 0.3s;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <nav class="nav-bar">
            <div class="nav-links"><a href="preorder.html">ย้อนกลับ</a></div>
        </nav>
        <div class="content-area">
            <div class="order-box">
                <h1 id="quadrantTitle">เลือกแบบเสื้อของคุณ</h1>
                <div class="shirt-grid" id="shirtOptions"></div>
            </div>
        </div>
    </div>

    <script>
        // ข้อมูลคำอธิบายเสื้อแต่ละตัว (คุณแก้ข้อความตรงนี้ได้เลย)
        const mbtiDetails = {
            'INTJ': { desc: 'The Architect: ผู้มีวิสัยทัศน์ คิดวิเคราะห์อย่างเป็นระบบ', link: 'https://m.me/ใส่IDเฟสบุ๊คของคุณตรงนี้' },
            'INTP': { desc: 'The Logician: นักคิดผู้ปราดเปรื่อง ชอบความท้าทายใหม่ๆ', link: 'https://m.me/ใส่IDเฟสบุ๊คของคุณตรงนี้' },
            'ENTJ': { desc: 'The Commander: ผู้นำที่กล้าหาญ มุ่งมั่นและเด็ดขาด', link: 'https://m.me/ใส่IDเฟสบุ๊คของคุณตรงนี้' },
            'ENTP': { desc: 'The Debater: นักแก้ปัญหาที่เปี่ยมไปด้วยความคิดสร้างสรรค์', link: 'https://m.me/ใส่IDเฟสบุ๊คของคุณตรงนี้' }
            // เพิ่มตัวอื่นๆ ได้ตามรูปแบบนี้ครับ
        };

        const mbtiData = { 
            'Rationalists': ['ENTP', 'ENTJ', 'INTJ', 'INTP'], 
            'Idealists': ['ENFJ', 'ENFP', 'INFJ', 'INFP'], 
            'Sentinels': ['ESTJ', 'ESFJ', 'ISTJ', 'ISFJ'], 
            'Explorers': ['ESTP', 'ESFP', 'ISTP', 'ISFP'] 
        };
        
        const params = new URLSearchParams(window.location.search);
        const quadrant = params.get('quadrant');
        const container = document.getElementById('shirtOptions');
        
        mbtiData[quadrant].forEach(type => {
            const detail = mbtiDetails[type] || { desc: 'เสื้อรุ่นพิเศษ MBTI', link: 'https://m.me/ใส่IDเฟสบุ๊คของคุณตรงนี้' };
            const card = document.createElement('div');
            card.className = 'shirt-card';
            
            card.innerHTML = `
                ${type === 'INTJ' ? '<img src="intj.png" class="shirt-img">' : ''}
                <strong>${type}</strong>
                <p class="desc-text">${detail.desc}</p>
                <a href="${detail.link}" target="_blank" class="order-btn">สั่งซื้อทาง Messenger</a>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
