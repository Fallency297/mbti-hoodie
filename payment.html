<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Select Your Type | Identity Quadrant</title>
    <style>
        .shirt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .shirt-card { 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 15px; 
            padding: 15px; 
            cursor: pointer; 
            text-align: center; 
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .shirt-card.selected { background: #fff; color: #000; transform: scale(1.05); }
        
        .img-container {
            width: 150px;
            height: 150px;
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .shirt-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
    </style>
</head>
<body>
    <div class="main-container">
        <nav class="nav-bar">
            <div class="nav-links"><a href="preorder.html" style="color:white; text-decoration:none;">ย้อนกลับ</a></div>
        </nav>
        <div class="content-area">
            <div class="order-box">
                <h1 id="quadrantTitle">YOUR QUADRANT</h1>
                <p>เลือกลายเสื้อ MBTI ที่คุณต้องการ</p>
                
                <div class="shirt-grid" id="shirtOptions"></div>
                
                <p id="summaryText" style="margin-top: 20px;">สรุปการสั่งซื้อ: โปรดเลือกแบบเสื้อ</p>
                <button class="btn-reserve" id="payBtn" disabled onclick="window.open('https://www.facebook.com/netva.jai?locale=th_TH', '_blank')">สั่งซื้อผ่าน Facebook</button>
            </div>
        </div>
    </div>

    <script>
        const mbtiData = { 
            'Rationalists': ['ENTP', 'ENTJ', 'INTJ', 'INTP'], 
            'Idealists': ['ENFJ', 'ENFP', 'INFJ', 'INFP'], 
            'Sentinels': ['ESTJ', 'ESFJ', 'ISTJ', 'ISFJ'], 
            'Explorers': ['ESTP', 'ESFP', 'ISTP', 'ISFP'] 
        };
        
        const params = new URLSearchParams(window.location.search);
        const quadrant = params.get('quadrant');
        const container = document.getElementById('shirtOptions');
        
        if (quadrant && mbtiData[quadrant]) {
            document.getElementById('quadrantTitle').innerText = quadrant.toUpperCase();

            mbtiData[quadrant].forEach(type => {
                const card = document.createElement('div');
                card.className = 'shirt-card';
                
                let imgHtml;
                if (type === 'INTJ') {
                    imgHtml = `<div class="img-container"><img src="intj.png" class="shirt-img" alt="INTJ"></div>`;
                } else if (type === 'INTP') {
                    imgHtml = `<div class="img-container"><img src="intp.jpg" class="shirt-img" alt="INTP"></div>`;
                } else if (type === 'ENTP') {
                    imgHtml = `<div class="img-container"><img src="entp.jpg" class="shirt-img" alt="ENTP"></div>`;
                } else if (type === 'ENTJ') {
                    imgHtml = `<div class="img-container"><img src="entj.png" class="shirt-img" alt="ENTJ"></div>`;
                } else {
                    imgHtml = `<div class="img-container" style="color:#aaa;">${type}</div>`;
                }
                
                card.innerHTML = `${imgHtml} <strong>${type}</strong>`;
                
                card.onclick = () => {
                    document.querySelectorAll('.shirt-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    document.getElementById('payBtn').disabled = false;
                    document.getElementById('summaryText').innerText = "สรุปการสั่งซื้อ: เสื้อลาย " + type;
                };
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
