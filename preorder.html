<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Pre-order | Identity Quadrant</title>
</head>
<body>
    <div class="main-container">
        <nav class="nav-bar">
            <div class="brand">IDENTITY QUADRANT.</div>
            <div class="nav-links">
                <a href="index.html">STORY</a>
                <span class="active">PRE-ORDER</span>
            </div>
        </nav>
        <div class="content-area">
            <div class="order-box">
                <h1>Reserve Your Quadrant</h1>
                <div class="house-selector" id="houseSelector">
                    <div class="house-btn active" data-house="Rationalists">Rationalists</div>
                    <div class="house-btn" data-house="Idealists">Idealists</div>
                    <div class="house-btn" data-house="Sentinels">Sentinels</div>
                    <div class="house-btn" data-house="Explorers">Explorers</div>
                </div>
                <button class="btn-reserve" onclick="goToPayment()">จองทันที</button>
            </div>
        </div>
    </div>

    <script>
        // ระบบเลือกกลุ่ม
        const btns = document.querySelectorAll('.house-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // ระบบส่งค่าไปหน้าชำระเงิน
        function goToPayment() {
            const selected = document.querySelector('.house-btn.active').innerText;
            window.location.href = `payment.html?quadrant=${selected}`;
        }
    </script>
</body>
</html>
